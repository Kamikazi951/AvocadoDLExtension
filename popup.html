<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AvocadoDL</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="avocado-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#8bc34a"/>
              <stop offset="50%" style="stop-color:#7cb342"/>
              <stop offset="100%" style="stop-color:#558b2f"/>
            </linearGradient>
          </defs>
          <circle cx="16" cy="16" r="14" fill="url(#avocado-gradient)" opacity="0.15"/>
          <path d="M16 6C11 6 7 11 7 17c0 5 3 9 9 9s9-4 9-9c0-6-4-11-9-11zm0 14a4 4 0 1 1 0-8 4 4 0 0 1 0 8z" fill="url(#avocado-gradient)"/>
          <circle cx="16" cy="16" r="2.5" fill="#5D4037"/>
        </svg>
        <h1 class="logo-text">AvocadoDL</h1>
      </div>
      <button id="btn-full-settings" class="icon-btn" title="Full Settings">
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </button>
    </div>
  </header>

  <div class="popup-body">
    <div class="setting-row">
      <div class="setting-info">
        <label>Floating button</label>
        <span class="setting-desc">Show on video hover</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="floating-button" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Button mode</label>
        <span class="setting-desc">Full banner or mini icon</span>
      </div>
      <div class="mode-toggle" role="radiogroup" aria-label="Button mode">
        <label class="mode-option">
          <input type="radio" name="floating-button-mode" value="full" checked>
          <span class="mode-option-inner">Full</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="floating-button-mode" value="mini">
          <span class="mode-option-inner">Mini</span>
        </label>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Button size</label>
        <span class="setting-desc">Small, Medium, Large</span>
      </div>
      <div class="mode-toggle size-toggle" role="radiogroup" aria-label="Button size">
        <label class="mode-option">
          <input type="radio" name="floating-button-size" value="small">
          <span class="mode-option-inner">S</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="floating-button-size" value="medium" checked>
          <span class="mode-option-inner">M</span>
        </label>
        <label class="mode-option">
          <input type="radio" name="floating-button-size" value="large">
          <span class="mode-option-inner">L</span>
        </label>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Position</label>
        <span class="setting-desc">Corner of the video</span>
      </div>
      <div class="setting-select-wrapper">
        <select id="floating-button-position" class="setting-select">
          <option value="top-right">Top-Right</option>
          <option value="top-left">Top-Left</option>
          <option value="bottom-right">Bottom-Right</option>
          <option value="bottom-left">Bottom-Left</option>
        </select>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Clipboard detection</label>
        <span class="setting-desc">Prompt on copied links</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="clipboard-pill" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Auto-dim on idle</label>
        <span class="setting-desc">Fade button when mouse stops</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="button-idle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Idle dim opacity</label>
        <span class="setting-desc">Fade level when idle</span>
      </div>
      <div class="popup-range-wrapper">
        <input type="range" id="idle-opacity" min="0" max="100" value="25" class="popup-range">
        <span class="popup-range-value" id="idle-opacity-value">25%</span>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-info">
        <label>Min video length</label>
        <span class="setting-desc">Skip short videos</span>
      </div>
      <div class="setting-select-wrapper">
        <select id="min-video-duration" class="setting-select">
          <option value="0">Any</option>
          <option value="10">10s</option>
          <option value="30">30s</option>
          <option value="60">1m</option>
          <option value="120">2m</option>
        </select>
      </div>
    </div>
  </div>

  <div class="popup-footer">
    <button id="btn-reset-position" class="footer-btn">Reset Position</button>
    <span class="footer-version">v1.1.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
